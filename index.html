<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مسابقة القرآن الكريم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

height:100vh;

background:
linear-gradient(rgba(0,80,40,.75),rgba(0,50,25,.8)),
url("https://images.unsplash.com/photo-1519817650390-64a93db511aa?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

}

.card{

background:white;
padding:50px;
width:90%;
max-width:700px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.3);

}

.logo{

width:120px;
height:120px;

border-radius:50%;

margin-bottom:20px;

object-fit:cover;

}

h1{

color:#0b6b36;

font-size:38px;

margin-bottom:15px;

}

h2{

color:#666;

margin-bottom:40px;

}

button{

background:#0b6b36;

color:white;

border:none;

padding:18px 50px;

font-size:25px;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#d4af37;

color:black;

transform:scale(1.05);

}

footer{

margin-top:40px;

color:#777;

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>
مسابقة القرآن الكريم
</h1>

<h2>
بالمسجد الكبير بالشوبك
</h2>

<button onclick="location.href='register.html'">

التسجيل

</button>

<footer>

جميع الحقوق محفوظة © المسجد الكبير بالشوبك

</footer>

</div>

</body>

</html>
