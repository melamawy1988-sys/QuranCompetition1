<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js'></script></head><body><h2>مسابقة القرآن الكريم بالمسجد الكبير بالشوبك</h2><form id=f><input id=name placeholder='الاسم'><br><input id=age type=number placeholder='العمر'><br><input id=parts type=number placeholder='عدد الأجزاء'><br><input id=nid placeholder='الرقم القومي'><br><input id=file type=file><br><button>حفظ</button></form><script>
const SUPABASE_URL='https://dqnliswnjyilunuyxtxo.supabase.co';
const SUPABASE_ANON_KEY='ضع_المفتاح_هنا';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
f.onsubmit=async(e)=>{e.preventDefault();
let p=+parts.value,day,cap;
if(p<=10){day='الثلاثاء';cap=20}else if(p<=20){day='الأربعاء';cap=15}else{day='الخميس';cap=10}
const {count}=await sb.from('participants').select('*',{count:'exact',head:true}).eq('day',day);
const hour=Math.floor((count||0)/cap)+1;
let path='';
if(file.files[0]){path=Date.now()+'_'+file.files[0].name;await sb.storage.from('birth-certificates').upload(path,file.files[0]);}
await sb.from('participants').insert({name:name.value,age:+age.value,parts:p,national_id:nid.value,birth_file:path,day,hour});
location='result.html?name='+encodeURIComponent(name.value)+'&age='+age.value+'&parts='+p+'&nid='+nid.value+'&day='+day+'&hour='+hour;
}
</script></body></html>
